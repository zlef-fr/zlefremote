<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!--zlef-seo-->
<meta name="description" content="ZlefRemote — control your computer from your phone.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#06060a">
<link rel="icon" href="https://assets.zlef.fr/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/app/icons/icon-192.png">
<!--/zlef-seo-->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ZlefRemote">
<link rel="manifest" href="/app.webmanifest">
<title>ZlefRemote</title>
<link rel="stylesheet" href="https://da.zlef.fr/tokens.css">
<link rel="stylesheet" href="/app/css/client.css?v=4">
<!-- InstallKit: accurate per-device "install this PWA" steps. mode=manual → no
     floating FAB; the home screen's Install button calls InstallKit.open(). -->
<script defer src="https://installkit.zlef.fr/v1/install-kit.js"
  data-mode="manual" data-app-name="ZlefRemote" data-site="remote.zlef.fr"
  data-theme="dark" data-accent="#9dae50"></script>
</head>
<body>
<!-- connection overlay -->
<div id="overlay" class="overlay" hidden>
  <div class="ov-card">
    <div class="spinner" id="ovSpin"></div>
    <div class="ov-icon" id="ovIcon" hidden></div>
    <h2 id="ovTitle">Connecting…</h2>
    <p id="ovText" class="ov-text"></p>
    <button id="ovBtn" class="zl-btn zl-btn--primary" hidden></button>
    <button id="ovHome" class="zl-btn zl-btn--ghost zl-btn--sm" hidden></button>
  </div>
</div>

<!-- ░░ HOME / device picker ░░ -->
<section class="view-home" id="viewHome" hidden>
  <header class="home-top">
    <span class="home-brand"><span class="brand-mark">◑</span><span class="brand-name">Zlef<b>Remote</b></span></span>
    <button class="installpill" id="installBtn" hidden></button>
  </header>
  <div class="home-head">
    <h1 id="homeTitle"></h1>
    <p id="homeSub"></p>
  </div>
  <div class="dev-list" id="devList"></div>
  <button class="addbtn" id="addDevice">
    <span class="add-plus">＋</span><span id="addLabel"></span>
  </button>
</section>

<!-- ░░ CONTROL ░░ -->
<!-- top status bar -->
<header class="topbar" id="topbar" hidden>
  <button class="iconbtn" id="homeBtn" aria-label="devices">◑</button>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span class="st-label" id="stLabel">…</span>
  </div>
  <div class="host" id="hostName"></div>
  <button class="iconbtn" id="gear" aria-label="settings">⚙</button>
</header>

<!-- views -->
<main class="stage" id="stage" hidden>
  <!-- TRACKPAD -->
  <section class="view view-pad" id="viewPad">
    <div class="pad" id="pad"><span class="pad-hint" id="padHint"></span></div>
    <div class="mousebar">
      <button class="mbtn" data-click="left" id="bLeft"></button>
      <button class="mbtn mid" data-click="middle" id="bMid"></button>
      <button class="mbtn" data-click="right" id="bRight"></button>
      <button class="mbtn lock" id="bDrag"></button>
    </div>
  </section>

  <!-- KEYBOARD -->
  <section class="view view-keys" id="viewKeys" hidden>
    <textarea id="typer" class="typer" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    <div class="modrow" id="modRow"></div>
    <div class="speckeys" id="specKeys"></div>
  </section>

  <!-- MEDIA -->
  <section class="view view-media" id="viewMedia" hidden>
    <div class="mediagrid" id="mediaGrid"></div>
  </section>
</main>

<!-- bottom tabs -->
<nav class="tabs" id="tabs" hidden>
  <button class="tab active" data-view="pad" id="tabPad"><span class="ti" data-ico="cursor"></span><span id="tlPad"></span></button>
  <button class="tab" data-view="keys" id="tabKeys"><span class="ti" data-ico="keyboard"></span><span id="tlKeys"></span></button>
  <button class="tab" data-view="media" id="tabMedia"><span class="ti" data-ico="sliders"></span><span id="tlMedia"></span></button>
</nav>

<!-- settings sheet -->
<div id="sheet" class="sheet" hidden>
  <div class="sheet-card">
    <div class="sheet-head"><h3 id="setTitle"></h3><button class="iconbtn" id="setClose">✕</button></div>
    <label class="setrow"><span id="lblSens"></span><input type="range" id="sens" min="0.6" max="3.2" step="0.1" value="1.6"></label>
    <label class="setrow"><span id="lblScroll"></span><input type="range" id="scrollSp" min="0.3" max="2.5" step="0.1" value="1.0"></label>
    <label class="setrow switch"><span id="lblNatural"></span><input type="checkbox" id="natural" checked></label>
    <div class="sheet-foot"><span class="secure-note" id="secureNote"></span></div>
  </div>
</div>

<!-- add-device sheet -->
<div id="addSheet" class="sheet" hidden>
  <div class="sheet-card add-card">
    <div class="sheet-head"><h3 id="addTitle"></h3><button class="iconbtn" id="addClose">✕</button></div>
    <div class="scanbox" id="scanbox"><video id="scanVideo" playsinline muted></video><span class="scan-frame"></span></div>
    <button class="zl-btn zl-btn--primary getbtn" id="scanBtn"><span id="scanBtnLabel"></span></button>
    <p class="scan-hint" id="scanHint"></p>
    <label class="paste-l" id="pasteL"></label>
    <div class="paste-row">
      <input id="pasteInput" class="paste-in" type="text" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" inputmode="url">
      <button class="zl-btn zl-btn--secondary" id="pasteGo"><span id="pasteGoLabel"></span></button>
    </div>
    <p class="add-err" id="addErr" hidden></p>
  </div>
</div>

<!-- toast -->
<div id="toast" class="toast" hidden></div>

<script src="/app/js/icons.js?v=2"></script>
<script src="/app/js/i18n.js?v=2"></script>
<script src="/app/js/crypto.js?v=2"></script>
<script src="/app/js/conn.js?v=2"></script>
<script src="/app/js/input.js?v=1"></script>
<script src="/app/js/home.js?v=2"></script>
<script src="/app/js/app.js?v=3"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
  }
</script>
</body>
</html>
