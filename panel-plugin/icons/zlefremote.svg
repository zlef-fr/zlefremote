<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- ZlefRemote panel icon: a phone radiating a control signal to a cursor.
       Olive Leaf primary (#9dae50) + Vintage Grape secondary (#b095b3) per the
       zlef.fr design identity (da.zlef.fr). Tuned to read on light & dark panels. -->
  <defs>
    <linearGradient id="zr-phone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bdce74"/>
      <stop offset="1" stop-color="#9dae50"/>
    </linearGradient>
  </defs>
  <!-- phone body -->
  <rect x="9" y="6" width="17" height="30" rx="4" ry="4"
        fill="url(#zr-phone)"/>
  <rect x="11.4" y="9" width="12.2" height="20" rx="1.6"
        fill="#06060a" opacity="0.82"/>
  <circle cx="17.5" cy="32.4" r="1.5" fill="#06060a" opacity="0.82"/>
  <!-- radiating control arcs -->
  <g fill="none" stroke="#b095b3" stroke-width="2.1" stroke-linecap="round">
    <path d="M30 15a8 8 0 0 1 0 12" opacity="0.95"/>
    <path d="M34 11a14 14 0 0 1 0 20" opacity="0.6"/>
  </g>
  <!-- cursor arrow it controls -->
  <path d="M33 30 L44 35 L38.6 36.6 L41.4 42 L38.7 43.2 L36 37.8 L32.2 41 Z"
        fill="#e9eae2" stroke="#06060a" stroke-width="0.8" stroke-linejoin="round"/>
</svg>
